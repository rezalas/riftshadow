name: Build & Test

on:
  push:
    branches:
      - main
    paths-ignore:
      - src/Riftshadow.Agent/**
  pull_request:
    branches:
      - main
    paths-ignore:
      - src/Riftshadow.Agent/**
  release:
    types:
      - published

jobs:
  build:
    name: ${{ matrix.compiler }}-${{ matrix.build_type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        build_type: [Debug, Release]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v5

      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitize:
    name: asan-ubsan
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v5

      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang

      - name: Configure (sanitized)
        run: cmake -S . -B build-asan -G Ninja -DCMAKE_BUILD_TYPE=Debug -DRIFT_SANITIZE=ON

      - name: Build
        run: cmake --build build-asan

      # ASAN halts on memory errors by default
      # detect_leaks=0: the codebase intentionally never frees; leak reports
      #   would be pure noise for now.
      # detect_odr_violation=0: tolerates the one known ODR violation,
      # UBSAN is print-only for now (halt_on_error unset) because of known UB
      - name: Test under sanitizers
        run: ctest --test-dir build-asan --output-on-failure
        env:
          ASAN_OPTIONS: detect_leaks=0:detect_odr_violation=0
          UBSAN_OPTIONS: print_stacktrace=1
